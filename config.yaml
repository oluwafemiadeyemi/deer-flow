config_version: 3
log_level: info

models:
  - name: "qwen3-32b"
    use: "deerflow.models.openai:OpenAIChatModel"
    model: "Qwen/Qwen3-32B"
    api_key: "$OPENAI_API_KEY"
    base_url: "$OPENAI_API_BASE"
    default: true

tools:
  - name: "web_search"
    group: "web"
    use: "deerflow.tools.search:DuckDuckGoSearchTool"
  - name: "web_fetch"
    group: "web"
    use: "deerflow.tools.fetch:WebFetchTool"

sandbox:
  use: "deerflow.sandbox.local:LocalSandboxProvider"
