config_version: 3

models:
  - model: "Qwen/Qwen3-32B"
    provider: "openai"
    base_url: "$OPENAI_API_BASE"
    api_key: "$OPENAI_API_KEY"
    default: true

tools:
  search:
    provider: "duckduckgo"
  fetch:
    enabled: true
  bash:
    enabled: false

sandbox:
  execution_mode: "local"

logging:
  level: "info"
